<script>
function getEmoji(minutes) {
  if (minutes <= 60) return "😃";
  if (minutes <= 120) return "😐";
  return "😡";
}

function drawGauge(minutes) {
  const canvas = document.getElementById("gauge");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height - 20;
  const radius = 110;
  const max = 180;

  const angle = v => Math.PI + (v / max) * Math.PI;

  ctx.beginPath();
  ctx.arc(cx, cy, radius, Math.PI, 0);
  ctx.strokeStyle = "#d8cfc0";
  ctx.lineWidth = 18;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, radius, Math.PI, angle(60));
  ctx.strokeStyle = "#0b3c6f";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, radius, angle(60), angle(120));
  ctx.strokeStyle = "#b58900";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, radius, angle(120), 0);
  ctx.strokeStyle = "#b71c1c";
  ctx.stroke();

  const a = angle(Math.min(minutes, max));

  const x = cx + (radius - 20) * Math.cos(a);
  const y = cy + (radius - 20) * Math.sin(a);

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(x, y);
  ctx.strokeStyle = "#0b1f3a";
  ctx.lineWidth = 6;
  ctx.stroke();
}

// 🔥 FUNÇÃO MAIS SEGURA DO MUNDO PARA SEU CASO
function parseDateTime(hora, data) {
  if (!hora || !data) return null;

  try {
    const dataStr = String(data).trim();
    const horaStr = String(hora).trim();

    const [d, m, y] = dataStr.split("/").map(Number);
    const [h, min] = horaStr.split(":").map(Number);

    if (!d || !m || !y) return null;

    return new Date(y, m - 1, d, h || 0, min || 0, 0);
  } catch {
    return null;
  }
}

async function carregarDados() {
  try {
    const url =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbMIAkflrN4vjDu9QnRFXfMaeIK525JimKOX_Ws3gSZwB2iGgvD8oEchUuIB8uGijnu0uyICbxJZlL/pub?output=csv";

    const response = await fetch(url);
    const text = await response.text();

    const linhas = text.replace(/\r/g, "").split("\n");

    let total = 0;
    let tempos = [];
    let listaPacientes = [];

    let leitosUTI = 0;
    let leitosAPT = 0;

    for (let i = 1; i < linhas.length; i++) {
      const colunas = linhas[i].split(",");

      if (!colunas || colunas.length < 6) continue;

      const nome = colunas[1];
      const local = colunas[3];

      // 🔥 SUA REGRA CORRETA:
      const hora = colunas[4]; // E
      const data = colunas[5]; // F

      if (!nome) continue;

      total++;

      if (i === 2) leitosUTI = colunas[11] || 0;
      if (i === 3) leitosAPT = colunas[11] || 0;

      const entrada = parseDateTime(hora, data);

      if (entrada) {
        const diff = (new Date() - entrada) / 60000;

        if (diff >= 0) {
          tempos.push(diff);

          listaPacientes.push({
            nome,
            local,
            diff,
            tempoFormatado:
              `${Math.floor(diff / 60)}h ${Math.floor(diff % 60)}min`
          });
        }
      }
    }

    listaPacientes.sort((a, b) => b.diff - a.diff);

    document.getElementById("total").innerText = total;
    document.getElementById("leitosUTI").innerText = leitosUTI;
    document.getElementById("leitosAPT").innerText = leitosAPT;

    if (tempos.length) {
      const media = tempos.reduce((a, b) => a + b, 0) / tempos.length;

      document.getElementById("tempoTexto").innerText =
        `${Math.floor(media / 60)}h ${Math.floor(media % 60)}min`;

      document.getElementById("emojiStatus").innerText = getEmoji(media);
      drawGauge(media);
    }

    document.getElementById("listaPacientes").innerHTML =
      listaPacientes.map(p => {
        let cor = p.diff > 120 ? "vermelho" :
                  p.diff > 60 ? "amarelo" : "verde";

        let localOk = (p.local || "").toLowerCase();
        let corLocal = localOk.includes("uti") ? "uti" : "apartamento";

        return `
          <div class="pacienteCard">
            <div class="linhaTop">
              <div class="nome">${p.nome}</div>
              <span class="badgeLocal ${corLocal}">
                ${corLocal.toUpperCase()}
              </span>
            </div>

            <div class="badgeTempo ${cor}">
              ${p.tempoFormatado}
            </div>
          </div>
        `;
      }).join("");

  } catch (err) {
    console.error("Erro:", err);
  }
}

setInterval(carregarDados, 5000);
carregarDados();
</script>
