<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitor de Pacientes</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f8f4;
      text-align: center;
      margin: 0;
    }

    header {
      background-color: #2e7d32;
      color: white;
      padding: 15px;
      font-size: 24px;
      font-family: "Times New Roman";
      text-align: left;
      padding-left: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #2e7d32;
    }
  </style>
</head>

<body>

<header>Facilitador</header>

<div class="box">
  <h2>Total de Pacientes</h2>
  <p id="total">Carregando...</p>
</div>

<div class="box">
  <h2>Locais de Internação</h2>
  <p id="locais">Carregando...</p>
</div>

<script>
async function carregarDados() {
  try {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbMIAkflrN4vjDu9QnRFXfMaeIK525JimKOX_Ws3gSZwB2iGgvD8oEchUuIB8uGijnu0uyICbxJZlL/gviz/tq?tqx=out:json";

    const response = await fetch(url);
    const text = await response.text();

    const json = JSON.parse(
      text.replace("google.visualization.Query.setResponse(", "").slice(0, -2)
    );

    const rows = json.table.rows;

    let total = 0;
    let locais = {};

    rows.forEach((row, index) => {
      if (!row.c) return;

      // Pegando TODAS as colunas disponíveis
      const cols = row.c.map(c => c ? c.v : "");

      // Segurança: garante que tem colunas suficientes
      if (cols.length < 4) return;

      const nome = cols[1];   // coluna B
      const local = cols[3];  // coluna D

      // linhas 3 a 9
      if (index >= 2 && index <= 8) {

        if (nome && nome.toString().trim() !== "") {
          total++;
        }

        if (local && local.toString().trim() !== "") {
          locais[local] = (locais[local] || 0) + 1;
        }
      }
    });

    document.getElementById("total").innerText = total;

    let textoLocais = Object.entries(locais)
      .map(([local, qtd]) => `${local} ${qtd} pacientes`)
      .join(" | ");

    document.getElementById("locais").innerText =
      textoLocais || "Nenhum dado";

  } catch (error) {
    console.error("ERRO REAL:", error);
    document.getElementById("total").innerText = "Erro";
    document.getElementById("locais").innerText = "Erro ao carregar";
  }
}

setInterval(carregarDados, 5000);
carregarDados();
</script>

</body>
</html>
