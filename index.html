<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedIA - Banco de Questões</title>

<style>
:root{
  --primary:#1b4332;
  --secondary:#40916c;
  --bg:#f4f7f4;
  --white:#ffffff;
  --text:#24302b;
  --muted:#66736c;
  --border:#d8e2dc;
  --danger:#c1121f;
  --ok:#2d6a4f;
  --warn:#f4a261;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:white;
  padding:22px 5%;
  box-shadow:0 3px 10px rgba(0,0,0,.18);
}

header h1{
  margin:0;
  font-size:28px;
  font-family:"Times New Roman", serif;
}

header p{
  margin:6px 0 0;
  opacity:.95;
}

.container{
  max-width:1180px;
  margin:0 auto;
  padding:24px 18px 60px;
}

.card{
  background:white;
  border:1px solid var(--border);
  border-radius:16px;
  box-shadow:0 6px 18px rgba(0,0,0,.07);
  padding:20px;
  margin-bottom:18px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

label{
  display:block;
  font-weight:bold;
  margin-bottom:6px;
  color:var(--primary);
}

select,input{
  width:100%;
  padding:12px;
  border:1px solid var(--border);
  border-radius:10px;
  font-size:15px;
  background:white;
}

button{
  border:0;
  border-radius:10px;
  padding:12px 16px;
  background:var(--primary);
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

button:hover{background:#123225}
button.secondary{background:var(--secondary)}
button.light{background:#e9f5ee;color:var(--primary)}
button.danger{background:var(--danger)}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  margin-top:14px;
}

.status{
  color:var(--muted);
  font-size:14px;
  margin-top:10px;
}

.question-card{
  background:white;
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  margin:18px 0;
  box-shadow:0 4px 16px rgba(0,0,0,.06);
}

.question-header{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  margin-bottom:14px;
}

.question-number{
  background:var(--primary);
  color:white;
  padding:8px 12px;
  border-radius:999px;
  font-weight:bold;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#edf6f0;
  color:var(--primary);
  font-weight:bold;
  font-size:13px;
}

.enunciado{
  line-height:1.55;
  font-size:16px;
}

.enunciado img,
.question-images img,
.alternativa img{
  max-width:100%;
  height:auto;
  display:block;
  margin:12px auto;
  border-radius:10px;
  border:1px solid #e5e5e5;
}

.question-images{
  margin:12px 0;
}

.alternativas{
  display:grid;
  gap:10px;
  margin-top:16px;
}

.alternativa{
  width:100%;
  text-align:left;
  background:#f8fbf9;
  color:var(--text);
  border:1px solid var(--border);
  display:flex;
  gap:10px;
  align-items:flex-start;
  font-weight:normal;
}

.alternativa:hover{
  background:#eef7f1;
}

.alternativa .letra{
  min-width:32px;
  height:32px;
  border-radius:50%;
  background:var(--primary);
  color:white;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.alternativa.correta{
  background:#d8f3dc;
  border-color:#52b788;
}

.alternativa.errada{
  background:#ffe5e5;
  border-color:#e63946;
}

.alternativa.selecionada{
  outline:3px solid rgba(64,145,108,.25);
}

.resultado{
  margin-top:12px;
  padding:12px;
  border-radius:10px;
  background:#f1f3f2;
  display:none;
}

.resultado.show{display:block}
.resultado.ok{background:#d8f3dc;color:#1b4332}
.resultado.bad{background:#ffe5e5;color:#8b0000}
.resultado.anulada{background:#e9ecef;color:#495057}

.topbar{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(244,247,244,.96);
  backdrop-filter:blur(8px);
  padding:12px 0;
  border-bottom:1px solid var(--border);
  margin-bottom:18px;
}

.progress{
  height:12px;
  border-radius:999px;
  background:#dfe7e2;
  overflow:hidden;
  margin-top:10px;
}

.progress > div{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--secondary),var(--primary));
}

.stats{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}

.stat{
  background:#f8fbf9;
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 12px;
  font-weight:bold;
}

.hidden{display:none!important}

.footer-note{
  text-align:center;
  color:var(--muted);
  margin-top:28px;
  font-size:13px;
}

@media(max-width:700px){
  header h1{font-size:23px}
  .question-card{padding:15px}
  .enunciado{font-size:15px}
  .question-header{align-items:flex-start;flex-direction:column}
}
</style>
</head>

<body>

<header>
  <h1>MedIA - Banco de Questões</h1>
  <p>Residência Médica</p>
</header>

<div class="container">

  <div class="card">
    <div class="grid">
      <div>
        <label for="provaSelect">Prova</label>
        <select id="provaSelect">
          <option value="usp-sp-2023.json">USP-SP 2023</option>
        </select>
      </div>

      <div>
        <label for="busca">Buscar no enunciado</label>
        <input id="busca" type="text" placeholder="Digite uma palavra-chave..." />
      </div>

      <div>
        <label for="filtroStatus">Filtro</label>
        <select id="filtroStatus">
          <option value="todas">Todas as questões</option>
          <option value="respondidas">Respondidas</option>
          <option value="naoRespondidas">Não respondidas</option>
          <option value="corretas">Corretas</option>
          <option value="erradas">Erradas</option>
          <option value="anuladas">Anuladas</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button onclick="carregarProva()">Abrir prova</button>
      <button class="secondary" onclick="corrigirTodas()">Mostrar gabarito</button>
      <button class="light" onclick="limparRespostas()">Limpar respostas</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <div id="painelProgresso" class="card hidden">
    <strong id="tituloProva">USP-SP 2023</strong>

    <div class="progress">
      <div id="barraProgresso"></div>
    </div>

    <div class="stats">
      <div class="stat">Respondidas: <span id="statRespondidas">0</span></div>
      <div class="stat">Acertos: <span id="statAcertos">0</span></div>
      <div class="stat">Erros: <span id="statErros">0</span></div>
      <div class="stat">Anuladas: <span id="statAnuladas">0</span></div>
      <div class="stat">Total: <span id="statTotal">0</span></div>
    </div>
  </div>

  <div class="topbar hidden" id="topbar">
    <div class="actions">
      <button class="light" onclick="irParaPrimeiraNaoRespondida()">Ir para próxima não respondida</button>
      <button class="light" onclick="window.scrollTo({top:0,behavior:'smooth'})">Voltar ao topo</button>
    </div>
  </div>

  <div id="questoes"></div>

  <div class="footer-note">
    Arquivo esperado: <strong>usp-sp-2023.json</strong>
  </div>

</div>

<script>
const EXAMES = {
  "usp-sp-2023.json": {
    titulo: "USP-SP 2023",
    arquivo: "usp-sp-2023.json"
  }
};

let questoes = [];
let respostas = {};
let gabaritoVisivel = false;
let provaAtual = "usp-sp-2023.json";

function setStatus(msg){
  document.getElementById("status").innerHTML = msg || "";
}

function normalizarQuestoes(json){
  if(Array.isArray(json)) return json;

  if(Array.isArray(json.questoes)) return json.questoes;
  if(Array.isArray(json.questions)) return json.questions;
  if(Array.isArray(json.data)) return json.data;

  if(json.prova && Array.isArray(json.prova.questoes)) return json.prova.questoes;

  return [];
}

function getNumero(q, index){
  return q.numero ?? q.n ?? q.id ?? q.questao ?? (index + 1);
}

function getEnunciado(q){
  return q.enunciado ?? q.texto ?? q.pergunta ?? q.statement ?? "";
}

function getGabarito(q){
  let g = q.gabarito ?? q.correta ?? q.resposta ?? q.answer ?? q.correctAnswer ?? "";
  if(Array.isArray(g)) g = g.join("");
  return String(g).trim().toUpperCase();
}

function getAlternativas(q){
  const letras = ["A","B","C","D"];

  if(Array.isArray(q.alternativas)){
    return letras.map((letra, i) => ({
      letra,
      texto: q.alternativas[i] ?? ""
    }));
  }

  if(q.alternativas && typeof q.alternativas === "object"){
    return letras.map(letra => ({
      letra,
      texto: q.alternativas[letra] ?? q.alternativas[letra.toLowerCase()] ?? ""
    }));
  }

  if(q.options && Array.isArray(q.options)){
    return letras.map((letra, i) => ({
      letra,
      texto: q.options[i] ?? ""
    }));
  }

  return letras.map(letra => ({
    letra,
    texto: q[letra] ?? q[letra.toLowerCase()] ?? ""
  }));
}

function caminhoImagem(src){
  if(!src) return "";

  src = String(src).trim();

  if(
    src.startsWith("http://") ||
    src.startsWith("https://") ||
    src.startsWith("data:") ||
    src.startsWith("./") ||
    src.startsWith("/")
  ){
    return src;
  }

  return src;
}

function candidatosImagem(src){
  if(!src) return [];

  src = String(src).trim();

  const lista = [
    src,
    "./" + src,
    "./data/" + src,
    src.replace(/^data\//,""),
    "./" + src.replace(/^data\//,""),
    "./data/" + src.replace(/^data\//,"")
  ];

  if(src.startsWith("imagens/")){
    lista.push("./data/" + src);
    lista.push("data/" + src);
  }

  if(src.startsWith("data/imagens/")){
    lista.push(src.replace(/^data\//,""));
    lista.push("./" + src.replace(/^data\//,""));
  }

  return [...new Set(lista.filter(Boolean))];
}

function corrigirImagens(container){
  const imgs = container.querySelectorAll("img");

  imgs.forEach(img => {
    const original = img.getAttribute("src");
    const candidatos = candidatosImagem(original);
    img.dataset.fallbacks = JSON.stringify(candidatos);
    img.dataset.fallbackIndex = "0";

    img.onerror = function(){
      let arr = [];
      try{ arr = JSON.parse(this.dataset.fallbacks || "[]"); }catch(e){ arr = []; }

      let idx = Number(this.dataset.fallbackIndex || 0) + 1;
      if(idx < arr.length){
        this.dataset.fallbackIndex = String(idx);
        this.src = arr[idx];
      }else{
        this.onerror = null;
        this.alt = "Imagem não encontrada";
        this.style.display = "none";
      }
    };
  });
}

function renderImagensDaQuestao(q, enunciado){
  const temImagemNoTexto = /<img/i.test(String(enunciado));

  if(temImagemNoTexto) return "";

  const imagens = q.imagens ?? q.imgs ?? q.images ?? q.imagem ?? q.img;

  if(!imagens) return "";

  const lista = Array.isArray(imagens) ? imagens : [imagens];

  return `
    <div class="question-images">
      ${lista.map(item => {
        let src = "";

        if(typeof item === "string"){
          src = item;
        }else if(item && typeof item === "object"){
          src = item.src ?? item.url ?? item.caminho ?? item.path ?? "";
        }

        src = caminhoImagem(src);

        if(!src) return "";

        return `<img src="${escapeHtml(src)}" alt="Imagem da questão">`;
      }).join("")}
    </div>
  `;
}

function escapeHtml(texto){
  return String(texto)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function textoAlternativaSeguro(texto){
  texto = texto ?? "";

  if(typeof texto !== "string"){
    texto = String(texto);
  }

  return texto;
}

async function carregarJsonComFallback(arquivo){
  const caminhos = [
    `./data/provas/${arquivo}`,
    `data/provas/${arquivo}`,
    `./provas/${arquivo}`,
    `provas/${arquivo}`,
    `./${arquivo}`,
    arquivo
  ];

  let ultimoErro = "";

  for(const caminho of caminhos){
    try{
      const resp = await fetch(caminho, {cache:"no-store"});

      if(resp.ok){
        return await resp.json();
      }

      ultimoErro = `${caminho}: HTTP ${resp.status}`;
    }catch(e){
      ultimoErro = `${caminho}: ${e.message}`;
    }
  }

  throw new Error(
    `Não consegui abrir o arquivo ${arquivo}. ` +
    `Verifique se ele está em data/provas/${arquivo} ou provas/${arquivo}. ` +
    `Último erro: ${ultimoErro}`
  );
}

async function carregarProva(){
  provaAtual = document.getElementById("provaSelect").value;
  const exame = EXAMES[provaAtual];

  setStatus("Carregando prova...");
  document.getElementById("questoes").innerHTML = "";
  document.getElementById("painelProgresso").classList.add("hidden");
  document.getElementById("topbar").classList.add("hidden");

  try{
    const json = await carregarJsonComFallback(exame.arquivo);
    questoes = normalizarQuestoes(json);

    if(!questoes.length){
      throw new Error("O JSON foi encontrado, mas não achei a lista de questões.");
    }

    respostas = JSON.parse(localStorage.getItem(storageKey()) || "{}");
    gabaritoVisivel = false;

    document.getElementById("tituloProva").textContent = exame.titulo;
    document.getElementById("painelProgresso").classList.remove("hidden");
    document.getElementById("topbar").classList.remove("hidden");

    renderizarQuestoes();
    setStatus(`Prova carregada com sucesso: ${questoes.length} questões.`);
  }catch(e){
    setStatus(`<span style="color:#c1121f;font-weight:bold;">Erro:</span> ${escapeHtml(e.message)}`);
  }
}

function storageKey(){
  return `respostas_${provaAtual}`;
}

function salvarRespostas(){
  localStorage.setItem(storageKey(), JSON.stringify(respostas));
}

function renderizarQuestoes(){
  const termo = document.getElementById("busca").value.trim().toLowerCase();
  const filtro = document.getElementById("filtroStatus").value;

  const html = questoes.map((q, index) => {
    const numero = getNumero(q, index);
    const enunciado = getEnunciado(q);
    const gabarito = getGabarito(q);
    const alternativas = getAlternativas(q);
    const resposta = respostas[numero] || "";
    const anulada = gabarito === "*";

    const textoBusca = [
      numero,
      enunciado,
      alternativas.map(a => a.texto).join(" ")
    ].join(" ").toLowerCase();

    if(termo && !textoBusca.includes(termo)) return "";

    const respondida = Boolean(resposta);
    const correta = respondida && resposta === gabarito && !anulada;
    const errada = respondida && resposta !== gabarito && !anulada;

    if(filtro === "respondidas" && !respondida) return "";
    if(filtro === "naoRespondidas" && respondida) return "";
    if(filtro === "corretas" && !correta) return "";
    if(filtro === "erradas" && !errada) return "";
    if(filtro === "anuladas" && !anulada) return "";

    let resultadoClasse = "";
    let resultadoTexto = "";

    if(anulada){
      resultadoClasse = "anulada";
      resultadoTexto = "Questão anulada.";
    }else if(respondida){
      if(correta){
        resultadoClasse = "ok";
        resultadoTexto = `Correta. Gabarito: ${gabarito}.`;
      }else{
        resultadoClasse = "bad";
        resultadoTexto = `Errada. Você marcou ${resposta}. Gabarito: ${gabarito}.`;
      }
    }else if(gabaritoVisivel){
      resultadoClasse = "anulada";
      resultadoTexto = `Gabarito: ${gabarito || "não informado"}.`;
    }

    const mostrarResultado = anulada || respondida || gabaritoVisivel;

    return `
      <div class="question-card" id="q-${numero}" data-numero="${numero}">
        <div class="question-header">
          <span class="question-number">Questão ${numero}</span>
          ${anulada ? `<span class="badge">Anulada</span>` : `<span class="badge">Gabarito ${gabarito || "-"}</span>`}
        </div>

        ${renderImagensDaQuestao(q, enunciado)}

        <div class="enunciado">
          ${enunciado}
        </div>

        <div class="alternativas">
          ${alternativas.map(alt => {
            const selecionada = resposta === alt.letra;
            const isCorreta = (gabaritoVisivel || respondida) && alt.letra === gabarito && !anulada;
            const isErrada = respondida && selecionada && alt.letra !== gabarito && !anulada;

            let classes = "alternativa";
            if(selecionada) classes += " selecionada";
            if(isCorreta) classes += " correta";
            if(isErrada) classes += " errada";

            const textoAlt = textoAlternativaSeguro(alt.texto);

            return `
              <button class="${classes}" onclick="responder('${numero}','${alt.letra}')">
                <span class="letra">${alt.letra}</span>
                <span>${textoAlt || ""}</span>
              </button>
            `;
          }).join("")}
        </div>

        <div class="resultado ${mostrarResultado ? "show" : ""} ${resultadoClasse}">
          ${resultadoTexto}
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("questoes").innerHTML = html || `
    <div class="card">
      Nenhuma questão encontrada com os filtros atuais.
    </div>
  `;

  corrigirImagens(document.getElementById("questoes"));
  atualizarEstatisticas();
}

function responder(numero, letra){
  const q = questoes.find((item, index) => String(getNumero(item,index)) === String(numero));
  if(!q) return;

  const gabarito = getGabarito(q);

  if(gabarito === "*"){
    respostas[numero] = letra;
  }else{
    respostas[numero] = letra;
  }

  salvarRespostas();
  renderizarQuestoes();

  const el = document.getElementById(`q-${numero}`);
  if(el){
    el.scrollIntoView({behavior:"smooth", block:"center"});
  }
}

function corrigirTodas(){
  gabaritoVisivel = true;
  renderizarQuestoes();
}

function limparRespostas(){
  if(!confirm("Deseja apagar todas as respostas desta prova?")) return;

  respostas = {};
  gabaritoVisivel = false;
  localStorage.removeItem(storageKey());
  renderizarQuestoes();
}

function atualizarEstatisticas(){
  let total = questoes.length;
  let respondidas = 0;
  let acertos = 0;
  let erros = 0;
  let anuladas = 0;

  questoes.forEach((q, index) => {
    const numero = getNumero(q, index);
    const gabarito = getGabarito(q);
    const resposta = respostas[numero];

    if(gabarito === "*"){
      anuladas++;
      return;
    }

    if(resposta){
      respondidas++;
      if(resposta === gabarito) acertos++;
      else erros++;
    }
  });

  document.getElementById("statTotal").textContent = total;
  document.getElementById("statRespondidas").textContent = respondidas;
  document.getElementById("statAcertos").textContent = acertos;
  document.getElementById("statErros").textContent = erros;
  document.getElementById("statAnuladas").textContent = anuladas;

  const percentual = total ? Math.round((respondidas / total) * 100) : 0;
  document.getElementById("barraProgresso").style.width = percentual + "%";
}

function irParaPrimeiraNaoRespondida(){
  for(let i = 0; i < questoes.length; i++){
    const numero = getNumero(questoes[i], i);

    if(!respostas[numero]){
      const el = document.getElementById(`q-${numero}`);
      if(el){
        el.scrollIntoView({behavior:"smooth", block:"start"});
      }
      return;
    }
  }

  alert("Todas as questões foram respondidas.");
}

document.getElementById("busca").addEventListener("input", renderizarQuestoes);
document.getElementById("filtroStatus").addEventListener("change", renderizarQuestoes);

window.addEventListener("DOMContentLoaded", carregarProva);
</script>

</body>
</html>
