<script>
function getEmoji(minutes) {
  if (minutes <= 60) return "😃";
  if (minutes <= 120) return "😐";
  return "😡";
}

// 🔥 CSV parser REAL (resolve 100% os erros)
function parseCSV(text) {
  const rows = [];
  let row = [];
  let current = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];

    if (c === '"') {
      inQuotes = !inQuotes;
    } else if (c === "," && !inQuotes) {
      row.push(current);
      current = "";
    } else if (c === "\n" && !inQuotes) {
      row.push(current);
      rows.push(row);
      row = [];
      current = "";
    } else {
      current += c;
    }
  }

  if (current || row.length) {
    row.push(current);
    rows.push(row);
  }

  return rows;
}

// 🔥 junta DATA (F) + HORA (E)
function parseDateTime(data, hora) {
  try {
    if (!data || !hora) return null;

    const [d, m, y] = data.trim().split("/").map(Number);
    const [h, min] = hora.trim().split(":").map(Number);

    if (!d || !m || !y) return null;

    return new Date(y, m - 1, d, h || 0, min || 0, 0);
  } catch {
    return null;
  }
}

function drawGauge(minutes) {
  const canvas = document.getElementById("gauge");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height - 20;
  const radius = 110;
  const max = 180;

  const angle = v => Math.PI + (v / max) * Math.PI;

  ctx.beginPath();
  ctx.arc(cx, cy, radius, Math.PI, 0);
  ctx.strokeStyle = "#d8cfc0";
  ctx.lineWidth = 18;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, radius, Math.PI, angle(60));
  ctx.strokeStyle = "#0b3c6f";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, radius, angle(60), angle(120));
  ctx.strokeStyle = "#b58900";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, radius, angle(120), 0);
  ctx.strokeStyle = "#b71c1c";
  ctx.stroke();

  const a = angle(Math.min(minutes, max));

  const x = cx + (radius - 20) * Math.cos(a);
  const y = cy + (radius - 20) * Math.sin(a);

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(x, y);
  ctx.strokeStyle = "#0b1f3a";
  ctx.lineWidth = 6;
  ctx.stroke();
}

async function carregarDados() {
  try {
    const url =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbMIAkflrN4vjDu9QnRFXfMaeIK525JimKOX_Ws3gSZwB2iGgvD8oEchUuIB8uGijnu0uyICbxJZlL/pub?output=csv";

    const res = await fetch(url);
    const text = await res.text();

    const linhas = parseCSV(text);

    let total = 0;
    let tempos = [];
    let lista = [];

    let leitosUTI = 0;
    let leitosAPT = 0;

    for (let i = 1; i < linhas.length; i++) {
      const c = linhas[i];
      if (!c || c.length < 6) continue;

      const nome = c[1];
      const local = c[3];

      const hora = c[4]; // E
      const data = c[5]; // F

      if (!nome) continue;

      total++;

      if (i === 2) leitosUTI = c[11] || 0;
      if (i === 3) leitosAPT = c[11] || 0;

      const entrada = parseDateTime(data, hora);

      if (entrada) {
        const diff = (new Date() - entrada) / 60000;

        if (diff >= 0) {
          tempos.push(diff);

          lista.push({
            nome,
            local,
            diff,
            tempo: `${Math.floor(diff / 60)}h ${Math.floor(diff % 60)}min`
          });
        }
      }
    }

    lista.sort((a, b) => b.diff - a.diff);

    document.getElementById("total").innerText = total;
    document.getElementById("leitosUTI").innerText = leitosUTI;
    document.getElementById("leitosAPT").innerText = leitosAPT;

    if (tempos.length) {
      const media = tempos.reduce((a, b) => a + b, 0) / tempos.length;

      document.getElementById("tempoTexto").innerText =
        `${Math.floor(media / 60)}h ${Math.floor(media % 60)}min`;

      document.getElementById("emojiStatus").innerText = getEmoji(media);
      drawGauge(media);
    } else {
      document.getElementById("tempoTexto").innerText = "0h 0min";
      document.getElementById("emojiStatus").innerText = "😃";
      drawGauge(0);
    }

    document.getElementById("listaPacientes").innerHTML =
      lista.map(p => {
        let cor =
          p.diff > 120 ? "vermelho" :
          p.diff > 60 ? "amarelo" : "verde";

        let localOk = (p.local || "").toLowerCase();
        let tipo = localOk.includes("uti") ? "UTI" : "Apartamento";
        let corLocal = localOk.includes("uti") ? "uti" : "apartamento";

        return `
          <div class="pacienteCard">
            <div class="linhaTop">
              <div class="nome">${p.nome}</div>
              <span class="badgeLocal ${corLocal}">${tipo}</span>
            </div>

            <div class="badgeTempo ${cor}">
              ${p.tempo}
            </div>
          </div>
        `;
      }).join("");

  } catch (e) {
    console.error("Erro:", e);
    document.getElementById("listaPacientes").innerHTML =
      "Erro ao carregar dados.";
  }
}

setInterval(carregarDados, 5000);
carregarDados();
</script>
