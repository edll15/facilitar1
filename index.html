<script>
function getEmoji(min) {
  if (min <= 60) return "😃";
  if (min <= 120) return "😐";
  return "😡";
}

// interpretação MUITO segura da data (coluna F)
function parseDate(v) {
  if (!v) return null;

  v = String(v).trim();

  // dd/mm/yyyy hh:mm
  if (v.includes("/")) {
    const [d, m, rest] = v.split("/");
    let y, h = 0, min = 0;

    if (rest && rest.includes(" ")) {
      const [yearPart, timePart] = rest.split(" ");
      y = Number(yearPart);

      if (timePart) {
        [h, min] = timePart.split(":").map(Number);
      }
    } else {
      y = new Date().getFullYear();
    }

    return new Date(y, m - 1, d, h, min);
  }

  // hh:mm (assume hoje)
  if (v.includes(":")) {
    const [h, m] = v.split(":").map(Number);
    const d = new Date();
    d.setHours(h, m, 0, 0);
    return d;
  }

  return null;
}

function drawGauge(min) {
  const canvas = document.getElementById("gauge");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height - 20;
  const r = 110;
  const max = 180;

  const ang = v => Math.PI + (v / max) * Math.PI;

  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 0);
  ctx.strokeStyle = "#ddd";
  ctx.lineWidth = 18;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, ang(60));
  ctx.strokeStyle = "#0b3c6f";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, r, ang(60), ang(120));
  ctx.strokeStyle = "#b58900";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, r, ang(120), 0);
  ctx.strokeStyle = "#b71c1c";
  ctx.stroke();

  const a = ang(Math.min(min, max));

  const x = cx + (r - 20) * Math.cos(a);
  const y = cy + (r - 20) * Math.sin(a);

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(x, y);
  ctx.strokeStyle = "#0b1f3a";
  ctx.lineWidth = 6;
  ctx.stroke();
}

async function carregarDados() {
  try {

    const url =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbMIAkflrN4vjDu9QnRFXfMaeIK525JimKOX_Ws3gSZwB2iGgvD8oEchUuIB8uGijnu0uyICbxJZlL/pub?output=csv";

    const res = await fetch(url);
    const text = await res.text();

    const linhas = text
      .split("\n")
      .map(l => l.split(",").map(c => c.replace(/"/g, "").trim()));

    let total = 0;
    let tempos = [];
    let lista = [];

    let leitosUTI = 0;
    let leitosAPT = 0;

    for (let i = 1; i < linhas.length; i++) {
      const c = linhas[i];
      if (!c || c.length < 6) continue;

      const nome = c[1];
      const local = c[3];
      const data = parseDate(c[5]); // 🔥 COLUNA F

      if (!nome) continue;

      total++;

      if (i === 2) leitosUTI = c[11] || 0;
      if (i === 3) leitosAPT = c[11] || 0;

      if (data) {
        const diff = (new Date() - data) / 60000;

        if (diff >= 0 && diff < 20000) {
          tempos.push(diff);

          lista.push({
            nome,
            local,
            diff,
            tempo: `${Math.floor(diff / 60)}h ${Math.floor(diff % 60)}min`
          });
        }
      }
    }

    lista.sort((a, b) => b.diff - a.diff);

    document.getElementById("total").innerText = total;
    document.getElementById("leitosUTI").innerText = leitosUTI;
    document.getElementById("leitosAPT").innerText = leitosAPT;

    if (tempos.length) {
      const media = tempos.reduce((a, b) => a + b, 0) / tempos.length;

      document.getElementById("tempoTexto").innerText =
        `${Math.floor(media / 60)}h ${Math.floor(media % 60)}min`;

      document.getElementById("emojiStatus").innerText = getEmoji(media);
      drawGauge(media);
    }

    document.getElementById("listaPacientes").innerHTML =
      lista.map(p => `
        <div class="pacienteCard">
          <div class="linhaTop">
            <div class="nome">${p.nome}</div>
          </div>
          <div class="badgeTempo ${p.diff > 120 ? "vermelho" : p.diff > 60 ? "amarelo" : "verde"}">
            ${p.tempo}
          </div>
          <div class="badgeLocal">${p.local || ""}</div>
        </div>
      `).join("");

  } catch (err) {
    console.error("ERRO GERAL:", err);
  }
}

setInterval(carregarDados, 5000);
carregarDados();
</script>
