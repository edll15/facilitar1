<script>
async function carregarDados() {
  try {
    const url = "https://sheets.googleapis.com/v4/spreadsheets/1Hr4NYjGaTqEas-0EFfRlUfglXXf4NrnC20NTd2DUe-Q/values/B3:D9?key=SUA_API_KEY_AQUI";

    const response = await fetch(url);

    if (!response.ok) {
      throw new Error("Erro na API: " + response.status);
    }

    const data = await response.json();

    console.log("Dados recebidos:", data);

    if (!data.values) {
      throw new Error("Sem dados na planilha");
    }

    const linhas = data.values;

    let total = 0;
    let locais = {};

    linhas.forEach(linha => {
      let nome = linha[0];   // B
      let local = linha[2];  // D

      if (nome && nome.trim() !== "") {
        total++;
      }

      if (local && local.trim() !== "") {
        locais[local] = (locais[local] || 0) + 1;
      }
    });

    document.getElementById("total").innerText = total;

    let textoLocais = Object.entries(locais)
      .map(([local, qtd]) => `${local} ${qtd} pacientes`)
      .join(" | ");

    document.getElementById("locais").innerText =
      textoLocais || "Nenhum dado";

  } catch (error) {
    console.error("ERRO COMPLETO:", error);

    document.getElementById("total").innerText = "Erro";
    document.getElementById("locais").innerText = "Erro na API / chave inválida";
  }
}
</script>
