details { margin-bottom:5px; }

.form-group label { font-size:.8rem; font-weight:bold; margin-bottom:4px; }

.opt-list { list-style:none; padding:0; }

desvio à esquerda e discreta elevação dos níveis de transaminases. Foi submetida a uma

características, imóvel na região infundibular. As vias biliares extra-hepáticas têm calibre
preservado. Com base no quadro clínico, assinale a alternativa correta.`,

enun:`Um homem de 62 anos, etilista crônico, procura atendimento devido à queixa de epigastralgia

enun:`Um homem de 55 anos é admitido na sala de urgência devido à hematêmese volumosa há 2

lesão como Forrest IIa. Foram realizadas terapia com adrenalina e aplicação de um clipe

digestiva e na classificação de Forrest, avalie a conduta realizada.`,

opts:{
A:`A lesão Forrest IIa é considerada de baixo risco, não havendo indicação de terapia endoscópica.`,
B:`A conduta do endoscopista foi adequada, pois trata-se de uma lesão de alto risco para ressangramento e requer tratamento endoscópico.`,
C:`A conduta foi arriscada, pois, em casos de hemorragia exteriorizada por hematêmese, a conduta mais adequada é a realização de endoscopia digestiva alta em, no máximo, 4 horas da admissão.`,

B:`A fisiopatologia dessa patologia decorra de infecção biliar primária que ocorre por via ascendente, sendo indicada antibioticoterapia como tratamento inicial e observação da evolução do quadro.`,

ano:"2026",
enun:`Um homem de 62 anos, etilista crônico, procura atendimento devido à queixa de epigastralgia
esporádica e recorrente. Refere que os sintomas já persistem por anos, mas que nunca se
preocupou em procurar atendimento, até que recentemente começou a perder peso. Refere
que os episódios de dor costumam ser de forte intensidade, tipo queimação, com irradiação
para o dorso e, geralmente, ocorrem após as refeições. A perda de peso foi de 15 kg em 03
meses. Observa ainda que apresenta fezes volumosas e malcheirosas e que "boiam na água",
sendo visíveis gotículas de gordura ao redor. Nega náuseas ou vômitos. Os exames
laboratoriais revelam glicemia de jejum de 152 mg/dL, hemoglobina de 11,2 g/dL, bilirrubina
total de 0,6 mg/dL e deficiência de vitamina D. O ultrassom de abdome mostrou que o
pâncreas tem dimensões reduzidas, parênquima heterogêneo, com focos esparsos de
calcificação e dilatação do ducto pancreático principal. Com base no quadro clínico descrito,
assinale a alternativa correta.`,
img:null,
opts:{
A:`O quadro de dor epigástrica recorrente e a má absorção estão relacionados à inflamação aguda das células acinares e tendem a melhorar após jejum e hidratação venosa vigorosa.`,
B:`A esteatorreia é sinal de que houve perda da função endócrina pancreática, sendo indicada insulinoterapia como tratamento inicial.`,
C:`A condição é irreversível e crônica, havendo evidências de insuficiência exócrina e endócrina. São necessários suporte nutricional e reposição enzimática.`,
D:`É improvável que o quadro álgico seja proveniente de um acometimento pancreático, principalmente pela ausência de icterícia laboratorial.`,
E:`A suspeita clínica é de tumor da cabeça pancreática, e a conduta deve ser a realização de colangiopancreatografia retrógrada endoscópica (CPRE) com biópsias ou citologia.`
},
correta:"C"
},

enun:`Um homem de 68 anos, portador de insuficiência cardíaca congestiva, encontra-se no primeiro
dia de internação devido à queixa de dispneia progressiva, iniciada há alguns dias. Ao exame,
apresentou macicez a punho-percussão da base pulmonar direita, bem como murmúrio
vesicular abolido. Radiografia de tórax evidencia velamento do seio costofrênico direito. Foi
solicitada avaliação da cirurgia torácica que realizou toracocentese diagnóstico. No
procedimento, houve saída de 600 mL de líquido claro. A relação proteína pleural/proteína
sérica é de 0,2, e a relação DHL pleural/DHL sérica é de 0,4. A análise citológica negou
malignidade. Houve melhora dos sintomas, mas a radiografia de controle mostrou falha na
re-expansão pulmonar. Considerando os achados e o caso clínico descrito, assinale a alternativa
correta.`,
img:null,
opts:{
A:`O líquido tem características de exsudato possivelmente relacionado à pneumonia hospitalar. A antibioticoterapia deve incluir cobertura para germes multirresistentes e acompanhamento.`,
B:`A falha de re-expansão pulmonar após toracocentese com transudato é patognomônico de neoplasia oculta. O paciente deve ser estadiado e submetido à cirurgia.`,
C:`O líquido tem características de transudato, sendo a insuficiência cardíaca a principal causa. A falha de re-expansão sugere encarceramento pulmonar.`,
D:`O líquido é do tipo exsudato e, após o tratamento da infecção, deve ser realizada pleurodese química como tratamento de primeira linha.`,
E:`Mesmo se tratando de líquido do tipo transudato e havendo falha na re-expansão pulmonar, a videotoracoscopia é contraindicada. Em derrames benignos esta é uma medida excessiva e deve ser desestimulada.`
},

enun:`Um homem de 27 anos é encaminhado à sala de emergência após colisão de carro contra
poste, em alta velocidade. Apresenta-se agitado, com fala desconexa e entrecortada. A equipe
pré-hospitalar refere que observou equimose periorbital e um grande ferimento, com
exposição óssea, no membro inferior esquerdo. A frequência respiratória é de 35 irpm,
frequência cardíaca de 138 bpm, PA: 80 x 50 mmHg, saturação de oxigênio de 85% em ar
ambiente. À inspeção inicial, observou-se turgência jugular com desvio traqueal para a direita.
Assimetria torácica às custas de hiperdistensão do hemitórax esquerdo e murmúrio vesicular
abolido nessa região. O cirurgião realiza punção de alívio no segundo espaço intercostal à
esquerda. Com base no cenário descrito e nos princípios do atendimento inicial ao trauma,
avalie a conduta do cirurgião.`,
img:null,
opts:{
A:`A toracostomia foi precipitada, pois o diagnóstico não foi confirmado por exames de imagem, o que impediu o tratamento definitivo da condição de base.`,
B:`A prioridade, nesse caso, seria a intubação orotraqueal, pois o paciente apresenta rebaixamento do nível de consciência, indicando proteção de vias aéreas pelo risco de broncoaspiração.`,
C:`O tratamento deveria ser iniciado com reposição volêmica vigorosa, pois a alteração do nível de consciência provavelmente tem como etiologia a hipovolemia.`,
D:`A resposta verbal do paciente mostra perviedade das vias aéreas, podendo adiar a abordagem das vias aéreas e respiratórias. Deve-se, em seguida, atentar para o risco neurológico frente aos relatos da equipe pré-hospitalar.`,
E:`O tratamento foi adequado, pois foi identificada e tratada a ameaça imediata à vida do paciente antes de prosseguir com a avaliação das demais lesões.`
},
correta:"E"
},

enun:`Uma jovem de 24 anos é admitida na sala de trauma após queda de motocicleta em alta
velocidade. Está sonolenta, desorientada em tempo e espaço e apresenta hálito etílico.
Responde com poucas palavras aos questionamentos da equipe assistente. Apresenta
escoriações em face e epistaxe bilateral ativa. Ao exame, observam-se esforço respiratório
leve e dificuldade para falar. A equipe pré-hospitalar aplicou o colar cervical rígido ainda na
cena do trauma, mantendo-o durante todo o transporte e realizou a remoção do capacete, que
estava rachado, a quatro mãos. Atualmente, a saturação de oxigênio se encontra em 87%.
Considerando a abordagem inicial da via aérea dessa paciente, assinale a alternativa correta.`,
img:null,
opts:{
A:`A manobra de tração da mandíbula (jaw-thrust) é a maneira apropriada de manejo da via aérea nesse momento, associada à oxigenioterapia suplementar, máscara acoplada e saco reservatório não reinalante.`,
B:`Realizar exame físico da região cervical e, caso não haja dor à palpação da linha média, remover o colar cervical que aparenta estar causando dificuldades ventilatórias.`,
C:`Administrar oxigênio suplementar, preferencialmente, com cânula nasofaríngea, para, posteriormente, avaliar o quadro neurológico que aparenta estar alterado devido à hipóxia.`,
D:`A manobra de elevação do queixo (chin-lift) deve ser realizada e posteriormente avaliar se houve melhora do padrão respiratório e da saturação de oxigênio.`,
E:`A via aérea somente pode ser abordada após a avaliação radiológica completa da coluna cervical e do crânio, pois caso seja preciso realizar a intubação orotraqueal, a sedação necessária poderia mascarar sintomas neurológicos.`

correta:"A"

enun:`Considerando a Atenção Primária à Saúde, a Política Nacional de Atenção Básica (PNAB) e sua
implementação, por meio da Estratégia Saúde da Família (ESF), no contexto brasileiro, é
correto afirmar:`,
img:null,
opts:{
A:`a integralidade do cuidado é primariamente alcançada por meio da busca ativa realizada pelos Agentes Comunitários de Saúde, cuja função principal é garantir o vínculo de longo prazo entre o usuário e o médico da equipe, fortalecendo a longitudinalidade.`,
B:`a PNAB de 2017, ao flexibilizar a composição das equipes de Atenção Básica, reforçou o modelo da ESF como única opção para a organização do cuidado, promovendo um padrão homogêneo de alta qualidade em todos os municípios brasileiros e fortalecendo o acesso de primeiro contato.`,
C:`a territorialização, ao delimitar uma área geográfica de atuação, é a principal ferramenta para garantir a coordenação do cuidado, pois permite que a equipe de Saúde da Família gerencie com autonomia a agenda dos serviços de média e alta complexidade para sua população.`,
D:`o apoio matricial, realizado pelas equipes eMulti (antigo NASF-AB), fortalece a integralidade ao ampliar a capacidade clínica das equipes de Saúde da Família para abordar casos complexos, como os de saúde mental, diretamente no território, evitando encaminhamentos desnecessários.`,
E:`o financiamento por captação ponderada, introduzido pelo Previne Brasil, busca promover a equidade ao transferir mais recursos para áreas com maior vulnerabilidade, sendo um mecanismo que garante o fortalecimento da integralidade do cuidado prestado.`
},
correta:"D"
},

ano:"2026",
enun:`A Vigilância Epidemiológica recebe uma notificação da principal Unidade de Pronto-Atendimento
(UPA) da cidade com o relato de um aumento incomum no número de pacientes com
gastroenterite aguda (GEA). Durante um período de 36 horas, 25 pacientes foram atendidos
com a condição. A severidade do quadro clínico levou à necessidade de hospitalização para
cinco desses pacientes devido à desidratação. Durante o atendimento médico na UPA, vários
deles mencionaram ter participado de uma feira gastronômica que vem ocorrendo há 3 dias
seguidos, anteriores ao início dos sintomas. A feira conta com a participação de 15 barracas de
alimentos distintos com estimativa de 2.000 pessoas ao longo dos 3 dias de evento. Com a
responsabilidade de investigação do cluster de GEA e com base nas informações preliminares
disponíveis, assinale a alternativa correta acerca de ações tecnicamente apropriadas e
prioritárias para a fase inicial da investigação epidemiológica.`,
img:null,
opts:{
A:`Comparar o número atual de casos de GEA com a série histórica de notificações para o mesmo período, em anos anteriores, no município, e revisar os prontuários dos pacientes atendidos na UPA para verificar a consistência dos sinais e sintomas e descartar erros de diagnóstico.`,
B:`Deslocar a equipe de epidemiologia para realizar, de forma imediata e presencial, inspeções sanitárias detalhadas em todas as 15 barracas de alimentos que participaram do evento, procedendo com a coleta de amostras de alimentos suspeitos e a interdição cautelar dos estabelecimentos com irregularidades.`,
C:`Elaborar um relatório detalhado para a Secretário de Saúde, população e imprensa, comunicando que a feira é a fonte confirmada do surto e detalhando as falhas de manipulação de alimentos, que provavelmente ocorreram, para evitar a disseminação de notícias falsas e pânico dos moradores.`,
D:`Iniciar um estudo analítico do tipo caso-controle, recrutando os 25 pacientes da UPA como casos e utilizando voluntários saudáveis, contatados por meio das listas de presença à feira, como controles para identificar o alimento específico responsável pela transmissão.`,
E:`Implementar imediatamente medidas de controle populacional, como a suspensão de feiras e eventos gastronômicos no município, pelo período de 30 dias, até que a investigação epidemiológica seja concluída e o agente etiológico seja definitivamente identificado pelo laboratório.`
},
correta:"A"
},

enun:`Considerando os pontos de vista de Bradford Hill e a evolução da inferência causal em
epidemiologia, desde a sua formalização para doenças crônicas, em meados do século XX, até
as críticas e refinamentos contemporâneos, é correto afirmar que`,
img:null,
opts:{
A:`a coerência de uma associação é fortalecida quando diferentes pesquisadores, utilizando metodologias variadas em populações distintas, chegam a conclusões similares sobre a relação entre um fator de exposição e um desfecho, demonstrando a reprodutibilidade dos achados.`,
B:`a analogia, que envolve a comparação com outras relações causais estabelecidas, é considerada um dos pontos de vista mais fortes, pois permite a transferência quantitativa de evidências de uma associação conhecida para uma nova associação sob investigação.`,
C:`a plausibilidade biológica e a coerência de uma associação são pontos de vista inerentemente robustos, pelo estado do conhecimento científico em um determinado momento, de modo que a ausência de um mecanismo conhecido constitui forte evidência contra uma relação causal.`,
D:`a utilização de controles negativos, ou exposições de falsificação, para testar a robustez de uma associação contra fatores de confusão, é um dos nove pontos de vista originais propostos por Hill, sendo um componente central de seu arcabouço para a avaliação da especificidade.`,
E:`o critério da temporalidade, que postula que a causa deve preceder o efeito no tempo, é reconhecido como o único ponto de vista conceitualmente indispensável para o estabelecimento de uma relação causal, sendo que sua violação refuta a hipótese causal em uma dada observação.`
},
correta:"E"
},

function carregarQuestoesFixas() {
    questoesSUSSP2026.forEach(q => {
        if (!estado.banco.some(item => item.id === q.id)) {
            estado.banco.push(q);
        }
    });
}

window.onload = () => {
    inicializarSite();
    conectarFirebase();
};

function inicializarSite() {
    carregarQuestoesFixas();
    renderizarMenusEspecialidades();
    renderizarSelectEspecialidades();
    renderizarProvasIntegra();
    atualizarSelectTemas();
    render();
}

function renderizarProvasIntegra() {
    const menu = document.getElementById("menu-provas-integra");
    menu.innerHTML = "";
    instituicoesProvasIntegra.forEach(instituicao => {
        menu.innerHTML += `
            <details>
                <summary>${instituicao}</summary>
                <div style="padding-top:5px;">
                    ${anosProvasIntegra.map(ano => `
                        <div class="filter-item" onclick="filtrar('banca-ano', '${instituicao}|${ano}')">
                            ${instituicao} ${ano}
                        </div>
                    `).join("")}
                </div>
            </details>
        `;
    });
}

function getEspecialidadesBloco(bloco) {
    const base = especialidadesBasePorBloco[bloco] || [];
    const personalizadas = estado.especialidadesUsuario[bloco] || [];
    const todas = [...base, ...personalizadas];
    const unicas = [];
    todas.forEach(esp => {
        if (!temaExiste(unicas, esp)) unicas.push(esp);
    });
    return unicas;
}

function getTodasEspecialidades() {
    const todas = [];
    Object.keys(especialidadesBasePorBloco).forEach(bloco => {
        getEspecialidadesBloco(bloco).forEach(esp => {
            if (!temaExiste(todas, esp)) todas.push(esp);
        });
    });
    if (!temaExiste(todas, "Prova na íntegra")) todas.push("Prova na íntegra");
    return todas;
}

function renderizarMenusEspecialidades() {
    Object.keys(idsMenusPorBloco).forEach(bloco => {
        const menu = document.getElementById(idsMenusPorBloco[bloco]);
        if (!menu) return;
        menu.innerHTML = "";
        getEspecialidadesBloco(bloco).forEach(esp => {
            menu.innerHTML += `<div class="filter-item" onclick='mostrarTemasEspecialidade(${JSON.stringify(esp)})'>${esp}</div>`;
        });
    });
}

function renderizarSelectEspecialidades() {
    const selectDisc = document.getElementById("in-disc");
    selectDisc.innerHTML = "";
    getTodasEspecialidades().forEach(esp => {
        selectDisc.innerHTML += `<option value="${esp}">${esp}</option>`;
    });
}

function configurarStatus(texto) {
    document.getElementById("sync-status").innerText = texto;
}

function mostrarErroFirebase(texto) {
    const box = document.getElementById("erro-firebase");
    box.style.display = "block";
    box.innerHTML = texto;
}

async function conectarFirebase() {
    try {
        const app = initializeApp(firebaseConfig);
        try { getAnalytics(app); } catch (e) { console.warn("Analytics não iniciado:", e); }
        db = getFirestore(app);
        docRef = doc(db, "mediaApp", "bancoPrincipal");
        firebaseAtivo = true;
        configurarStatus("Sincronizando...");

        onSnapshot(docRef, async (snap) => {
            if (salvandoAgora) return;

            if (snap.exists()) {
                const dados = snap.data();
                estado.banco = Array.isArray(dados.banco) ? dados.banco : [];
                estado.temasUsuario = dados.temasUsuario || {};
                estado.temasOcultos = dados.temasOcultos || {};
                estado.especialidadesUsuario = dados.especialidadesUsuario || {};
            } else {
                await salvarOnline();
            }

            carregarQuestoesFixas();
            carregouPrimeiraVez = true;
            configurarStatus("Salvo online");
            renderizarMenusEspecialidades();
            renderizarSelectEspecialidades();
            renderizarProvasIntegra();
            atualizarSelectTemas();

            if (filtroAtual.tipo === "disciplina" && filtroAtual.especialidade) {
                mostrarTemasEspecialidade(filtroAtual.especialidade);
            } else {
                render();
            }
        }, (erro) => {
            console.error(erro);
            configurarStatus("Erro ao sincronizar");
            mostrarErroFirebase(`⚠️ Erro ao conectar ao Firestore.<br><br>Verifique se:<br>1. O Cloud Firestore foi ativado no Firebase.<br>2. As regras permitem leitura e escrita.<br>3. Você publicou as regras.`);
        });
    } catch (erro) {
        console.error(erro);
        configurarStatus("Erro no Firebase");
        mostrarErroFirebase(`⚠️ Não foi possível iniciar o Firebase.<br><br>Verifique se o código do Firebase foi copiado corretamente.`);
    }
}

async function salvarOnline() {
    if (!firebaseAtivo || !docRef) {
        alert("Firebase ainda não está conectado. Os dados não serão salvos online.");
        return false;
    }

    try {
        salvandoAgora = true;
        configurarStatus("Salvando...");

        const bancoSemQuestoesFixas = estado.banco.filter(q => !(q.id >= 2026001 && q.id <= 2026100));

        await setDoc(docRef, {
            banco: bancoSemQuestoesFixas,
            temasUsuario: estado.temasUsuario,
            temasOcultos: estado.temasOcultos,
            especialidadesUsuario: estado.especialidadesUsuario,
            atualizadoEm: serverTimestamp()
        }, { merge: true });

        configurarStatus("Salvo online");
        setTimeout(() => { salvandoAgora = false; }, 500);
        return true;
    } catch (erro) {
        salvandoAgora = false;
        console.error(erro);
        configurarStatus("Erro ao salvar");
        alert("Não foi possível salvar online. Verifique se o Firestore está ativado, se as regras permitem escrita e se há internet.");
        return false;
    }
}

function normalizarTexto(txt) {
    return String(txt || "").trim().replace(/\s+/g, " ");
}

function temaExiste(lista, novoTema) {
    const novo = normalizarTexto(novoTema).toLowerCase();
    return lista.some(t => normalizarTexto(t).toLowerCase() === novo);
}

function getTemasEspecialidade(especialidade) {
    const padrao = temasPadrao[especialidade] || [];
    const personalizados = estado.temasUsuario[especialidade] || [];
    const ocultos = estado.temasOcultos[especialidade] || [];
    const todos = [...padrao, ...personalizados];
    const unicos = [];
    todos.forEach(tema => {
        if (!temaExiste(unicos, tema)) unicos.push(tema);
    });
    return unicos.filter(tema => !ocultos.includes(tema));
}

window.adicionarEspecialidade = async function(bloco) {
    const input = document.getElementById(idsInputsPorBloco[bloco]);
    const novaEspecialidade = normalizarTexto(input.value);

    if (!novaEspecialidade) {
        alert("Digite o nome da especialidade.");
        return;
    }

    const todasEspecialidades = getTodasEspecialidades();

    if (temaExiste(todasEspecialidades, novaEspecialidade)) {
        alert("Esta especialidade já existe.");
        return;
    }

    if (!estado.especialidadesUsuario[bloco]) {
        estado.especialidadesUsuario[bloco] = [];
    }

    estado.especialidadesUsuario[bloco].push(novaEspecialidade);

    const salvou = await salvarOnline();
    if (!salvou) return;

    input.value = "";
    renderizarMenusEspecialidades();
    renderizarSelectEspecialidades();
    atualizarSelectTemas();
};

    filtroAtual = { tipo: "disciplina", valor: especialidade, especialidade: especialidade };
    document.getElementById("txt-filtro").innerHTML = `Mostrando: <strong>${especialidade}</strong>`;
    document.getElementById("lista").innerHTML = "";

    const temas = getTemasEspecialidade(especialidade);
    const area = document.getElementById("area-topicos");

    area.innerHTML = `
        <div class="topicos-card">
            <h2>${especialidade}</h2>
            <p>Escolha um tema para visualizar questões ou adicione um novo tema nesta especialidade.</p>
            <div class="add-tema-box">
                <input type="text" id="novo-tema-${especialidade}" placeholder="Adicionar tema. Ex: Hanseníase" onkeydown='if(event.key === "Enter"){ adicionarTema(${JSON.stringify(especialidade)}); }'>
                <button class="btn-tema" onclick='adicionarTema(${JSON.stringify(especialidade)})'>Adicionar tema</button>
            </div>
            ${
                temas.length > 0
                ? `<div class="topicos-grid">${temas.map(tema => `
                    <div class="topico-item" onclick='filtrarTema(${JSON.stringify(especialidade)}, ${JSON.stringify(tema)})'>
                        <span class="topico-nome">${tema}</span>
                        <button class="btn-lixeira-tema" title="Excluir tema" onclick='event.stopPropagation(); excluirTema(${JSON.stringify(especialidade)}, ${JSON.stringify(tema)})'>🗑️</button>
                    </div>`).join("")}</div>`
                : `<div class="empty-temas">Nenhum tema cadastrado ainda para esta especialidade.</div>`
            }
        </div>
    `;

    render();
};

window.adicionarTema = async function(especialidade) {
    const input = document.getElementById(`novo-tema-${especialidade}`);
    const novoTema = normalizarTexto(input.value);

    if (!novoTema) {
        alert("Digite o nome do tema.");
        return;
    }

    if (!estado.temasUsuario[especialidade]) {
        estado.temasUsuario[especialidade] = [];
    }

    const temasAtuais = getTemasEspecialidade(especialidade);

    if (temaExiste(temasAtuais, novoTema)) {
        alert("Este tema já existe nesta especialidade.");
        return;
    }

    estado.temasUsuario[especialidade].push(novoTema);

    const salvou = await salvarOnline();
    if (!salvou) return;

    input.value = "";
    mostrarTemasEspecialidade(especialidade);
    atualizarSelectTemas();
};

window.excluirTema = async function(especialidade, tema) {
    if (!confirm(`Deseja realmente excluir o tema "${tema}" de ${especialidade}?`)) return;

    const personalizados = estado.temasUsuario[especialidade] || [];
    const padrao = temasPadrao[especialidade] || [];

    if (personalizados.includes(tema)) {
        estado.temasUsuario[especialidade] = personalizados.filter(t => t !== tema);
        if (estado.temasUsuario[especialidade].length === 0) delete estado.temasUsuario[especialidade];
    }

    if (padrao.includes(tema)) {
        if (!estado.temasOcultos[especialidade]) estado.temasOcultos[especialidade] = [];
        if (!estado.temasOcultos[especialidade].includes(tema)) estado.temasOcultos[especialidade].push(tema);
    }

    if (filtroAtual.tipo === "tema" && filtroAtual.especialidade === especialidade && filtroAtual.valor === tema) {
        filtroAtual = { tipo: "disciplina", valor: especialidade, especialidade: especialidade };
    }

    const salvou = await salvarOnline();
    if (!salvou) return;

    mostrarTemasEspecialidade(especialidade);
    atualizarSelectTemas();
};

window.filtrarTema = function(especialidade, tema) {
    document.getElementById("area-topicos").innerHTML = "";
    filtroAtual = { tipo: "tema", valor: tema, especialidade: especialidade };
    document.getElementById("txt-filtro").innerHTML = `Mostrando: <strong>${especialidade} • ${tema}</strong>`;
    render();
};

window.atualizarSelectTemas = function() {
    const especialidade = document.getElementById("in-disc").value;
    const selectTema = document.getElementById("in-tema");

    selectTema.innerHTML = `<option value="">Sem tema específico</option>`;

    const temas = getTemasEspecialidade(especialidade);
    temas.forEach(tema => {
        selectTema.innerHTML += `<option value="${tema}">${tema}</option>`;
    });
};

window.toggleForm = function() {
    const p = document.getElementById("panel-cadastro");
    p.style.display = p.style.display === "block" ? "none" : "block";
    atualizarSelectTemas();
};

window.filtrar = function(tipo, valor) {
    document.getElementById("area-topicos").innerHTML = "";
    filtroAtual = { tipo: tipo, valor: valor, especialidade: null };

    if (tipo === "banca-ano" && valor) {
        const [banca, ano] = valor.split("|");
        document.getElementById("txt-filtro").innerHTML = `Mostrando: <strong>${banca} ${ano}</strong>`;
    } else {
        document.getElementById("txt-filtro").innerHTML = `Mostrando: <strong>${valor || "Todas as Questões"}</strong>`;
    }

    render();
};

document.getElementById("form-q").addEventListener("submit", function(e) {
    e.preventDefault();
    const file = document.getElementById("in-img").files[0];

    if (file) {
        const reader = new FileReader();
        reader.onloadend = () => salvarQuestao(reader.result);
        reader.readAsDataURL(file);
    } else {
        salvarQuestao(null);
    }
});

async function salvarQuestao(img) {
    const q = {
        id: Date.now(),
        disc: document.getElementById("in-disc").value,
        tema: document.getElementById("in-tema").value,
        banca: document.getElementById("in-banca").value,
        ano: document.getElementById("in-ano").value,
        enun: document.getElementById("in-enun").value,
        img: img,
        opts: {
            A: document.getElementById("in-a").value,
            B: document.getElementById("in-b").value,
            C: document.getElementById("in-c").value,
            D: document.getElementById("in-d").value
        },
        correta: document.getElementById("in-correta").value
    };

    estado.banco.unshift(q);

    const salvou = await salvarOnline();
    if (!salvou) return;

    document.getElementById("form-q").reset();
    atualizarSelectTemas();
    toggleForm();
    render();
}

function render() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const filtrados = estado.banco.filter(q => {
        if (filtroAtual.tipo === "todos") return true;
        if (filtroAtual.tipo === "disciplina") return q.disc === filtroAtual.valor;
        if (filtroAtual.tipo === "tema") return q.disc === filtroAtual.especialidade && q.tema === filtroAtual.valor;
        if (filtroAtual.tipo === "banca-ano") {
            const [b, a] = filtroAtual.valor.split("|");
            return q.banca === b && String(q.ano) === String(a);
        }
        return true;
    });

    if (!carregouPrimeiraVez && firebaseAtivo) {
        lista.innerHTML = `<p style="text-align:center; padding:2rem; color:#666">Carregando dados online...</p>`;
        return;
    }

    if (filtrados.length === 0) {
        lista.innerHTML = `<p style="text-align:center; padding:2rem; color:#666">Nenhuma questão encontrada aqui ainda.</p>`;
        return;
    }

    filtrados.forEach(q => {
        const letras = Object.keys(q.opts || {});
        lista.innerHTML += `
            <div class="question-card">
                <div class="q-header">
                    <span>${q.banca} (${q.ano}) • <strong>${q.disc}</strong>${q.tema ? ` • ${q.tema}` : ""}</span>
                    <button onclick="excluirQuestao(${q.id})" style="color:red; border:none; background:none; cursor:pointer">Remover</button>
                </div>

                ${q.img ? `<div class="q-img"><img src="${q.img}"></div>` : ""}

                <p style="font-weight:500; font-size:1.05rem; line-height:1.5">${q.enun}</p>

                <ul class="opt-list">
                    ${letras.map(letra => `
                        <li>
                            <label id="l-${q.id}-${letra}">
                                <input type="radio" name="r-${q.id}" value="${letra}"> ${letra}) ${q.opts[letra]}
                            </label>
                        </li>
                    `).join("")}
                </ul>

                <button class="btn-add" id="btn-${q.id}" onclick="corrigir(${q.id}, '${q.correta}')">
                    Confirmar Resposta
                </button>
            </div>
        `;
    });
}

window.corrigir = function(id, correta) {
    const sel = document.querySelector(`input[name="r-${id}"]:checked`);

    if (!sel) {
        alert("Selecione uma opção!");
        return;
    }

    const corretaEl = document.getElementById(`l-${id}-${correta}`);
    if (corretaEl) corretaEl.classList.add("correct");

    if (sel.value !== correta) {
        const erradaEl = document.getElementById(`l-${id}-${sel.value}`);
        if (erradaEl) erradaEl.classList.add("wrong");
    }

    document.getElementById(`btn-${id}`).disabled = true;
    document.getElementById(`btn-${id}`).innerText = "Questão Concluída";
    document.getElementById(`btn-${id}`).style.background = "#666";
};

window.excluirQuestao = async function(id) {
    if (confirm("Deseja realmente excluir esta questão?")) {
        estado.banco = estado.banco.filter(q => q.id !== id);
        const salvou = await salvarOnline();
        if (!salvou) return;
        render();
    }
};
</script>
