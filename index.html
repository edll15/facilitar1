<script>
function getEmoji(minutes) {
  if (minutes <= 60) return "😃";
  if (minutes <= 120) return "😐";
  return "😡";
}

// agora interpreta a coluna F corretamente
function parseDataHora(valor) {
  if (!valor) return null;

  valor = valor.trim();

  // formato: dd/mm/yyyy hh:mm
  if (valor.includes("/")) {
    let [data, hora] = valor.split(" ");
    let [d, m, y] = data.split("/").map(Number);

    let h = 0, min = 0;
    if (hora) {
      [h, min] = hora.split(":").map(Number);
    }

    return new Date(y, m - 1, d, h, min, 0);
  }

  // formato: hh:mm (assume hoje)
  if (valor.includes(":")) {
    let [h, m] = valor.split(":").map(Number);
    let d = new Date();
    d.setHours(h, m, 0, 0);
    return d;
  }

  return null;
}

function drawGauge(minutes) {
  const canvas = document.getElementById("gauge");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height - 20;
  const radius = 110;
  const max = 180;

  function angle(v) {
    return Math.PI + (v / max) * Math.PI;
  }

  ctx.beginPath();
  ctx.arc(cx, cy, radius, Math.PI, 0);
  ctx.strokeStyle = "#d8cfc0";
  ctx.lineWidth = 18;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, radius, Math.PI, angle(60));
  ctx.strokeStyle = "#0b3c6f";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, radius, angle(60), angle(120));
  ctx.strokeStyle = "#b58900";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, radius, angle(120), 0);
  ctx.strokeStyle = "#b71c1c";
  ctx.stroke();

  const a = angle(Math.min(minutes, max));

  const tipX = cx + (radius - 15) * Math.cos(a);
  const tipY = cy + (radius - 15) * Math.sin(a);

  const baseX = cx + (radius - 30) * Math.cos(a);
  const baseY = cy + (radius - 30) * Math.sin(a);

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(baseX, baseY);
  ctx.strokeStyle = "#0b1f3a";
  ctx.lineWidth = 7;
  ctx.stroke();

  ctx.beginPath();
  ctx.fillStyle = "#0b1f3a";
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(tipX - 16 * Math.cos(a - 0.6), tipY - 16 * Math.sin(a - 0.6));
  ctx.lineTo(tipX - 16 * Math.cos(a + 0.6), tipY - 16 * Math.sin(a + 0.6));
  ctx.closePath();
  ctx.fill();
}

async function carregarDados() {
  try {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbMIAkflrN4vjDu9QnRFXfMaeIK525JimKOX_Ws3gSZwB2iGgvD8oEchUuIB8uGijnu0uyICbxJZlL/pub?output=csv";

    const response = await fetch(url);
    let texto = await response.text();

    texto = texto.replace(/\r/g, "");
    const linhas = texto.split("\n");

    let total = 0;
    let tempos = [];
    let listaPacientes = [];

    let leitosUTI = 0;
    let leitosAPT = 0;

    linhas.forEach((linha, index) => {
      if (!linha) return;

      const colunas = linha.split(",");

      if (colunas.length < 6) return;

      let nome = colunas[1];
      let local = colunas[3];

      // 🔥 AGORA USANDO COLUNA F (ÍNDICE 5)
      let dataEntrada = parseDataHora(colunas[5]);

      if (index === 2) leitosUTI = colunas[11] || 0;
      if (index === 3) leitosAPT = colunas[11] || 0;

      if (index >= 2 && index <= 49) {

        if (nome && nome.trim() !== "") total++;

        if (dataEntrada && nome && nome.trim() !== "") {

          let agora = new Date();
          let diff = (agora - dataEntrada) / 60000;

          if (diff >= 0 && diff < 10000) {
            tempos.push(diff);

            listaPacientes.push({
              nome,
              local,
              tempoFormatado: `${Math.floor(diff / 60)}h ${Math.floor(diff % 60)}min`,
              diff
            });
          }
        }
      }
    });

    listaPacientes.sort((a, b) => b.diff - a.diff);

    document.getElementById("total").innerText = total;
    document.getElementById("leitosUTI").innerText = leitosUTI;
    document.getElementById("leitosAPT").innerText = leitosAPT;

    if (tempos.length > 0) {
      let media = tempos.reduce((a, b) => a + b, 0) / tempos.length;

      document.getElementById("tempoTexto").innerText =
        `${Math.floor(media / 60)}h ${Math.floor(media % 60)}min`;

      document.getElementById("emojiStatus").innerText = getEmoji(media);
      drawGauge(media);
    } else {
      document.getElementById("tempoTexto").innerText = "0h 0min";
      document.getElementById("emojiStatus").innerText = "😃";
      drawGauge(0);
    }

    document.getElementById("listaPacientes").innerHTML =
      listaPacientes.map(p => `
        <div class="pacienteCard">
          <div class="linhaTop">
            <div class="nome">${p.nome}</div>
            <span class="badgeLocal">${p.local}</span>
          </div>
          <div class="badgeTempo ${p.diff > 120 ? "vermelho" : p.diff > 60 ? "amarelo" : "verde"}">
            ${p.tempoFormatado}
          </div>
        </div>
      `).join("");

  } catch (error) {
    console.error(error);
  }
}

setInterval(carregarDados, 5000);
carregarDados();
</script>
