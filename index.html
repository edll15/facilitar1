<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitor de Pacientes</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f8f4;
      text-align: center;
      margin: 0;
    }

    header {
      background-color: #2e7d32;
      color: white;
      padding: 15px;
      font-size: 24px;
      font-family: "Times New Roman";
      text-align: left;
      padding-left: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #2e7d32;
    }
  </style>
</head>

<body>

<header>Facilitador</header>

<div class="box">
  <h2>Total de Pacientes</h2>
  <p id="total">Carregando...</p>
</div>

<div class="box">
  <h2>Locais de Internação</h2>
  <p id="locais">Carregando...</p>
</div>

<div class="box">
  <h2>Tempo Médio de Espera</h2>
  <p id="tempo">Carregando...</p>
</div>

<!-- NOVA CAIXA -->
<div class="box">
  <h2>Tempo de Espera por Paciente</h2>
  <p id="listaPacientes">Carregando...</p>
</div>

<script>
async function carregarDados() {
  try {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbMIAkflrN4vjDu9QnRFXfMaeIK525JimKOX_Ws3gSZwB2iGgvD8oEchUuIB8uGijnu0uyICbxJZlL/pub?output=csv";

    const response = await fetch(url);
    let texto = await response.text();

    texto = texto.replace(/\r/g, "");
    const linhas = texto.split("\n");

    let total = 0;
    let locais = {};
    let tempos = [];
    let listaPacientes = [];

    linhas.forEach((linha, index) => {
      if (!linha) return;

      const colunas = linha.split(",");
      if (colunas.length < 5) return;

      let nome = colunas[1];   // B
      let local = colunas[3];  // D
      let horario = colunas[4]; // E

      if (index >= 2 && index <= 49) {

        // TOTAL
        if (nome && nome.trim() !== "") {
          total++;
        }

        // LOCAIS
        if (local && local.trim() !== "") {
          local = local.trim().toLowerCase();

          if (local === "uti") local = "Uti";
          else if (local === "apartamento") local = "Apartamento";
          else local = local.charAt(0).toUpperCase() + local.slice(1);

          locais[local] = (locais[local] || 0) + 1;
        }

        // TEMPO + LISTA DE PACIENTES
        if (horario && horario.trim() !== "" && nome && nome.trim() !== "") {
          let partes = horario.split(":");

          if (partes.length === 2) {
            let horas = parseInt(partes[0]);
            let minutos = parseInt(partes[1]);

            let agora = new Date();
            let entrada = new Date();

            entrada.setHours(horas);
            entrada.setMinutes(minutos);
            entrada.setSeconds(0);

            let diff = (agora - entrada) / 60000;

            if (diff >= 0 && diff < 1440) {
              tempos.push(diff);

              let h = Math.floor(diff / 60);
              let m = Math.floor(diff % 60);

              let tempoFormatado = `${h}h ${m}min`;

              listaPacientes.push(`${nome} - ${tempoFormatado}`);
            }
          }
        }
      }
    });

    // TOTAL
    document.getElementById("total").innerText = total;

    // LOCAIS
    let textoLocais = "";

    if (locais["Apartamento"]) {
      textoLocais += `Apartamento: ${locais["Apartamento"]} pacientes<br>`;
    }

    if (locais["Uti"]) {
      textoLocais += `UTI: ${locais["Uti"]} pacientes`;
    }

    document.getElementById("locais").innerHTML =
      textoLocais || "Nenhum dado";

    // TEMPO MÉDIO
    if (tempos.length > 0) {
      let media = tempos.reduce((a, b) => a + b, 0) / tempos.length;

      let horas = Math.floor(media / 60);
      let minutos = Math.floor(media % 60);

      document.getElementById("tempo").innerText =
        `${horas}h ${minutos}min`;
    } else {
      document.getElementById("tempo").innerText = "Sem dados";
    }

    // LISTA DE PACIENTES
    if (listaPacientes.length > 0) {
      document.getElementById("listaPacientes").innerHTML =
        listaPacientes.join("<br>");
    } else {
      document.getElementById("listaPacientes").innerText = "Sem dados";
    }

  } catch (error) {
    console.error(error);
    document.getElementById("total").innerText = "Erro";
    document.getElementById("locais").innerText = "Erro";
    document.getElementById("tempo").innerText = "Erro";
    document.getElementById("listaPacientes").innerText = "Erro";
  }
}

setInterval(carregarDados, 5000);
carregarDados();
</script>

</body>
</html>
