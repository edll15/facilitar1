<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitor de Pacientes</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f8f4;
      text-align: center;
      margin: 0;
    }

    header {
      background-color: #2e7d32;
      color: white;
      padding: 15px;
      font-size: 24px;
      font-family: "Times New Roman";
      text-align: left;
      padding-left: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #2e7d32;
    }

    /* 🔥 CENTRALIZA APENAS A CAIXA DO TEMPO MÉDIO */
    .tempo-box {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 140px;
      text-align: center;
    }

    .tempo-box h2 {
      margin-bottom: 10px;
    }

    /* 📱 RESPONSIVO */
    @media (max-width: 700px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>Facilitador</header>

<div class="container">

  <div class="box">
    <h2>Total de Pacientes</h2>
    <p id="total">Carregando...</p>
  </div>

  <div class="box">
    <h2>Locais de Internação</h2>
    <p id="locais">Carregando...</p>
  </div>

  <!-- 🔥 CAIXA CENTRALIZADA -->
  <div class="box tempo-box">
    <h2>Tempo Médio de Espera</h2>
    <p id="tempo">Carregando...</p>
  </div>

  <div class="box">
    <h2>Tempo de Espera por Paciente</h2>
    <p id="listaPacientes">Carregando...</p>
  </div>

</div>

<script>
async function carregarDados() {
  try {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbMIAkflrN4vjDu9QnRFXfMaeIK525JimKOX_Ws3gSZwB2iGgvD8oEchUuIB8uGijnu0uyICbxJZlP/pub?output=csv";

    const response = await fetch(url);
    let texto = await response.text();

    texto = texto.replace(/\r/g, "");
    const linhas = texto.split("\n");

    let total = 0;
    let locais = {};
    let tempos = [];
    let listaPacientes = [];

    linhas.forEach((linha, index) => {
      if (!linha) return;

      const colunas = linha.split(",");
      if (colunas.length < 5) return;

      let nome = colunas[1];
      let local = colunas[3];
      let horario = colunas[4];

      if (index >= 2 && index <= 49) {

        if (nome && nome.trim() !== "") total++;

        if (local && local.trim() !== "") {
          local = local.trim().toLowerCase();

          if (local === "uti") local = "Uti";
          else if (local === "apartamento") local = "Apartamento";
          else local = local.charAt(0).toUpperCase() + local.slice(1);

          locais[local] = (locais[local] || 0) + 1;
        }

        if (horario && horario.trim() !== "" && nome && nome.trim() !== "") {
          let partes = horario.split(":");

          if (partes.length === 2) {
            let horas = parseInt(partes[0]);
            let minutos = parseInt(partes[1]);

            let agora = new Date();
            let entrada = new Date();

            entrada.setHours(horas);
            entrada.setMinutes(minutos);
            entrada.setSeconds(0);

            let diff = (agora - entrada) / 60000;

            if (diff >= 0 && diff < 1440) {
              tempos.push(diff);

              let h = Math.floor(diff / 60);
              let m = Math.floor(diff % 60);

              let tempoFormatado = `${h}h ${m}min`;

              listaPacientes.push({ nome, tempoFormatado, diff });
            }
          }
        }
      }
    });

    listaPacientes.sort((a, b) => b.diff - a.diff);

    document.getElementById("total").innerText = total;

    let textoLocais = "";

    if (locais["Apartamento"]) {
      textoLocais += `Apartamento: ${locais["Apartamento"]} pacientes<br>`;
    }

    if (locais["Uti"]) {
      textoLocais += `UTI: ${locais["Uti"]} pacientes`;
    }

    document.getElementById("locais").innerHTML = textoLocais || "Nenhum dado";

    if (tempos.length > 0) {
      let media = tempos.reduce((a, b) => a + b, 0) / tempos.length;

      let horas = Math.floor(media / 60);
      let minutos = Math.floor(media % 60);

      document.getElementById("tempo").innerText =
        `${horas}h ${minutos}min`;
    } else {
      document.getElementById("tempo").innerText = "Sem dados";
    }

    if (listaPacientes.length > 0) {

      let html = listaPacientes.map(p => {
        if (p.diff >= 120) {
          return `<span style="color:red;font-weight:bold">
                    ${p.nome} - ${p.tempoFormatado}
                  </span>`;
        } else {
          return `${p.nome} - ${p.tempoFormatado}`;
        }
      }).join("<br>");

      document.getElementById("listaPacientes").innerHTML = html;

    } else {
      document.getElementById("listaPacientes").innerText = "Sem dados";
    }

  } catch (error) {
    console.error(error);
    document.getElementById("total").innerText = "Erro";
    document.getElementById("locais").innerText = "Erro";
    document.getElementById("tempo").innerText = "Erro";
    document.getElementById("listaPacientes").innerText = "Erro";
  }
}

setInterval(carregarDados, 5000);
carregarDados();
</script>

</body>
</html>
