<script>
function getEmoji(min) {
  if (min <= 60) return "😃";
  if (min <= 120) return "😐";
  return "😡";
}

// 🔥 agora junta DATA (F) + HORA (E)
function parseDataHora(hora, data) {
  if (!hora || !data) return null;

  try {
    // DATA (F) → dd/mm/yyyy
    const [d, m, y] = String(data).trim().split("/").map(Number);

    // HORA (E) → hh:mm
    const [h, min] = String(hora).trim().split(":").map(Number);

    return new Date(y, m - 1, d, h, min, 0);
  } catch {
    return null;
  }
}

function drawGauge(min) {
  const canvas = document.getElementById("gauge");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height - 20;
  const r = 110;
  const max = 180;

  const angle = v => Math.PI + (v / max) * Math.PI;

  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 0);
  ctx.strokeStyle = "#ddd";
  ctx.lineWidth = 18;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, angle(60));
  ctx.strokeStyle = "#0b3c6f";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, r, angle(60), angle(120));
  ctx.strokeStyle = "#b58900";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, r, angle(120), 0);
  ctx.strokeStyle = "#b71c1c";
  ctx.stroke();

  const a = angle(Math.min(min, max));

  const x = cx + (r - 20) * Math.cos(a);
  const y = cy + (r - 20) * Math.sin(a);

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(x, y);
  ctx.strokeStyle = "#0b1f3a";
  ctx.lineWidth = 6;
  ctx.stroke();
}

async function carregarDados() {
  try {
    const url =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbMIAkflrN4vjDu9QnRFXfMaeIK525JimKOX_Ws3gSZwB2iGgvD8oEchUuIB8uGijnu0uyICbxJZlL/pub?output=csv";

    const res = await fetch(url);
    const text = await res.text();

    const linhas = text
      .replace(/\r/g, "")
      .split("\n")
      .map(l => l.split(",").map(c => c.replace(/"/g, "").trim()));

    let total = 0;
    let tempos = [];
    let lista = [];

    let leitosUTI = 0;
    let leitosAPT = 0;

    for (let i = 1; i < linhas.length; i++) {
      const c = linhas[i];
      if (!c || c.length < 6) continue;

      const nome = c[1];
      const local = c[3];

      const hora = c[4]; // 🔥 COLUNA E
      const data = c[5]; // 🔥 COLUNA F

      if (!nome) continue;

      total++;

      if (i === 2) leitosUTI = c[11] || 0;
      if (i === 3) leitosAPT = c[11] || 0;

      const entrada = parseDataHora(hora, data);

      if (entrada) {
        const diff = (new Date() - entrada) / 60000;

        if (diff >= 0 && diff < 20000) {
          tempos.push(diff);

          lista.push({
            nome,
            local,
            diff,
            tempo: `${Math.floor(diff / 60)}h ${Math.floor(diff % 60)}min`
          });
        }
      }
    }

    lista.sort((a, b) => b.diff - a.diff);

    document.getElementById("total").innerText = total;
    document.getElementById("leitosUTI").innerText = leitosUTI;
    document.getElementById("leitosAPT").innerText = leitosAPT;

    if (tempos.length) {
      const media = tempos.reduce((a, b) => a + b, 0) / tempos.length;

      document.getElementById("tempoTexto").innerText =
        `${Math.floor(media / 60)}h ${Math.floor(media % 60)}min`;

      document.getElementById("emojiStatus").innerText = getEmoji(media);
      drawGauge(media);
    } else {
      document.getElementById("tempoTexto").innerText = "0h 0min";
      document.getElementById("emojiStatus").innerText = "😃";
      drawGauge(0);
    }

    document.getElementById("listaPacientes").innerHTML =
      lista.map(p => `
        <div class="pacienteCard">
          <div class="linhaTop">
            <div class="nome">${p.nome}</div>
          </div>
          <div class="badgeTempo ${p.diff > 120 ? "vermelho" : p.diff > 60 ? "amarelo" : "verde"}">
            ${p.tempo}
          </div>
          <div class="badgeLocal">${p.local || ""}</div>
        </div>
      `).join("");

  } catch (err) {
    console.error("Erro:", err);
  }
}

setInterval(carregarDados, 5000);
carregarDados();
</script>
