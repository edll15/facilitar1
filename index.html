<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitor de Pacientes</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f8f4;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #2e7d32;
      color: white;
      padding: 15px;
      font-size: 24px;
      font-family: "Times New Roman";
      text-align: left;
      padding-left: 20px;
    }

    .container {
      margin-top: 40px;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #2e7d32;
    }
  </style>
</head>

<body>

<header>Facilitador</header>

<div class="container">

  <div class="box">
    <h2>Total de Pacientes</h2>
    <p id="total">Carregando...</p>
  </div>

  <div class="box">
    <h2>Locais de Internação</h2>
    <p id="locais">Carregando...</p>
  </div>

</div>

<script>
async function carregarDados() {
  try {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbMIAkflrN4vjDu9QnRFXfMaeIK525JimKOX_Ws3gSZwB2iGgvD8oEchUuIB8uGijnu0uyICbxJZlL/gviz/tq?tqx=out:json";

    const response = await fetch(url);
    const text = await response.text();

    // Corrige o formato do Google
    const json = JSON.parse(text.substring(47).slice(0, -2));

    const rows = json.table.rows;

    let total = 0;
    let locais = {};

    rows.forEach((row, index) => {
      const nome = row.c[1]?.v;   // Coluna B
      const local = row.c[3]?.v;  // Coluna D

      // Considera apenas linhas 3 a 9
      if (index >= 2 && index <= 8) {

        if (nome && nome.toString().trim() !== "") {
          total++;
        }

        if (local && local.toString().trim() !== "") {
          locais[local] = (locais[local] || 0) + 1;
        }
      }
    });

    document.getElementById("total").innerText = total;

    let textoLocais = Object.entries(locais)
      .map(([local, qtd]) => `${local} ${qtd} pacientes`)
      .join(" | ");

    document.getElementById("locais").innerText =
      textoLocais || "Nenhum dado";

  } catch (error) {
    console.error("Erro:", error);
    document.getElementById("total").innerText = "Erro";
    document.getElementById("locais").innerText = "Erro ao carregar";
  }
}

// Atualiza a cada 5 segundos
setInterval(carregarDados, 5000);

// Primeira carga
carregarDados();
</script>

</body>
</html>
