<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Observação</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
  background-image: url("https://images.pexels.com/photos/263402/pexels-photo-263402.jpeg");
  background-size: cover;
}

header {
  background: #0b1f3a;
  color: white;
  padding: 15px;
  text-align: left;
  font-family: "Times New Roman";
}

.container {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 15px;
  padding: 20px;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.pacientesGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 10px;
}

.pacienteCard {
  background: #f5f0e6;
  padding: 10px;
  border-radius: 8px;
}

.verde {background: green; color:white; padding:4px; border-radius:6px;}
.amarelo {background: orange; color:white; padding:4px; border-radius:6px;}
.vermelho {background: red; color:white; padding:4px; border-radius:6px;}
</style>
</head>

<body>

<header>Observação</header>

<div class="container">

<div class="box">
<h2>Total</h2>
<div id="total">0</div>
</div>

<div class="box">
<h2>Tempo Médio</h2>
<div id="tempoTexto">0h</div>
</div>

<div class="box" style="grid-column:1/-1;">
<h2>Pacientes</h2>
<div id="listaPacientes" class="pacientesGrid"></div>
</div>

</div>

<script>

function parseDataHora(data, hora) {
  if (!data || !hora) return null;

  data = data.replace(/"/g,"").trim();
  hora = hora.replace(/"/g,"").trim();

  let partesHora = hora.split(":");
  if (partesHora.length < 2) return null;

  let h = parseInt(partesHora[0]);
  let m = parseInt(partesHora[1]);

  let dia, mes, ano;

  if (data.includes("/")) {
    [dia, mes, ano] = data.split("/");
  } else if (data.includes("-")) {
    [ano, mes, dia] = data.split("-");
  } else {
    return null;
  }

  let d = new Date(ano, mes - 1, dia, h, m);

  if (isNaN(d)) return null;

  return d;
}

async function carregarDados() {

  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbMIAkflrN4vjDu9QnRFXfMaeIK525JimKOX_Ws3gSZwB2iGgvD8oEchUuIB8uGijnu0uyICbxJZlL/pub?output=csv";

  const res = await fetch(url);
  let txt = await res.text();

  let sep = txt.includes(";") ? ";" : ",";
  let linhas = txt.split("\n");

  let total = 0;
  let tempos = [];
  let lista = [];

  linhas.forEach((l, i) => {

    let c = l.split(sep);
    if (c.length < 6) return;

    let nome = c[1]?.trim();
    let hora = c[4];
    let data = c[5];

    if (i >= 2 && nome) {

      total++;

      let entrada = parseDataHora(data, hora);
      if (!entrada) return;

      let diff = (new Date() - entrada) / 60000;

      if (diff < 0 || isNaN(diff)) return;

      tempos.push(diff);

      let h = Math.floor(diff / 60);
      let m = Math.floor(diff % 60);

      lista.push({
        nome,
        tempo: `${h}h ${m}min`,
        diff
      });
    }

  });

  lista.sort((a,b)=>b.diff-a.diff);

  document.getElementById("total").innerText = total;

  if (tempos.length) {
    let media = tempos.reduce((a,b)=>a+b,0)/tempos.length;
    document.getElementById("tempoTexto").innerText =
      `${Math.floor(media/60)}h ${Math.floor(media%60)}min`;
  }

  document.getElementById("listaPacientes").innerHTML =
    lista.map(p => `
      <div class="pacienteCard">
        <b>${p.nome}</b><br>
        <span class="${p.diff>120?"vermelho":p.diff>60?"amarelo":"verde"}">
          ${p.tempo}
        </span>
      </div>
    `).join("");

}

setInterval(carregarDados,5000);
carregarDados();

</script>

</body>
</html>
