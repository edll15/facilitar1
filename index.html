<script>
async function carregarDados() {
  try {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbMIAkflrN4vjDu9QnRFXfMaeIK525JimKOX_Ws3gSZwB2iGgvD8oEchUuIB8uGijnu0uyICbxJZlL/pub?output=csv";

    const response = await fetch(url);
    const texto = await response.text();

    const linhas = texto.split("\n");

    let total = 0;
    let locais = {};

    linhas.forEach((linha, index) => {
      const colunas = linha.split(",");

      let nome = colunas[1];   // coluna B
      let local = colunas[3];  // coluna D

      // linhas 3 a 9
      if (index >= 2 && index <= 8) {

        if (nome && nome.trim() !== "") {
          total++;
        }

        if (local && local.trim() !== "") {

          // 🔥 NORMALIZAÇÃO (CORREÇÃO PRINCIPAL)
          local = local
            .toString()
            .trim()
            .toLowerCase();

          // Capitaliza (Apartamento, Uti, etc.)
          local = local.charAt(0).toUpperCase() + local.slice(1);

          locais[local] = (locais[local] || 0) + 1;
        }
      }
    });

    document.getElementById("total").innerText = total;

    let textoLocais = Object.entries(locais)
      .map(([local, qtd]) => `${local} ${qtd} pacientes`)
      .join(" | ");

    document.getElementById("locais").innerText =
      textoLocais || "Nenhum dado";

  } catch (error) {
    console.error(error);
    document.getElementById("total").innerText = "Erro";
    document.getElementById("locais").innerText = "Erro ao carregar";
  }
}

setInterval(carregarDados, 5000);
carregarDados();
</script>
